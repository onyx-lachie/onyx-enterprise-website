    <!-- JSON-LD Schema Markup - SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Onyx CRM",
      "description": "AI-powered CRM built for insurance agents. Automate follow-up, book appointments, and manage your book of business.",

      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "99",
        "priceCurrency": "USD",
        "priceValidUntil": "2025-12-31"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5",
        "ratingCount": "300"
      }
    }
    </script>

    <!-- JSON-LD Schema Markup - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+1-737-325-8808",

    <!-- JSON-LD Schema Markup - FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "mainEntity": [
        {
          "@type": "Question",
          "name": "How long does setup take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most agents are live within 48 hours. We handle the setup on a 1-on-1 onboarding call."
          }
        },
        {
          "@type": "Question",
          "name": "What insurance verticals do you support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Onyx supports mortgage protection, final expense, Medicare, life insurance, health insurance, IUL, and annuity agents with pre-built Stacks for each vertical."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need technical skills to use Onyx?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No technical skills required. We set everything up for you on a personalized onboarding call, and our support team is available whenever you need help."
          }
        },
        {
          "@type": "Question",
          "name": "Can I try before I buy?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! We offer a 14-day money-back guarantee. If you're not satisfied, we'll refund your first month—no questions asked."
          }
        },
        {
          "@type": "Question",
          "name": "What integrations does Onyx support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Onyx integrates with Google Calendar, Outlook, Twilio, Zapier, and other popular tools insurance agents use daily."
          }
        }
      ]
    }
    </script>
